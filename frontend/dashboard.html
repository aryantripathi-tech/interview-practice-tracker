<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Interview Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="
    background-color: #1e40af;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;">

        <span style="color: white; font-weight: bold; font-size: 18px;">
            🎯 Interview Tracker
        </span>
        <div style="display: flex; gap: 12px;">
            <a href="dashboard.html"
                style="color: #93c5fd; text-decoration: none; font-size: 14px;">
                Dashboard
            </a>
            <a href="stats.html"
                style="color: #93c5fd; text-decoration: none; font-size: 14px;">
                Stats
            </a>
            <a href="questions.html"
                style="color: #93c5fd; text-decoration: none; font-size: 14px;">
                + Add Question
            </a>
            <a href="#" onclick="logout()"
                style="color: #fca5a5; text-decoration: none; font-size: 14px;">
                Logout
            </a>
        </div>
    </nav>

    <div class="container">
        <h1>My Interview Questions</h1>
        <p id="subtitle">Loading your questions...</p>
        <p id="breakdown" style="color: #475569; margin-top: 4px;"></p>

        <div style="margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;">
            <input
             type="text"
             id="searchInput"
             placeholder="Search by title or company..."
             style="flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px;">
            
            <select
             id="filterDifficulty"
             style="padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px;">
                <option value="All">All Difficulties</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>

        <button
         onclick="window.location.href='question.html'"
         style="margin-top: 16px;">
            + Add New Question
        </button>

        <button
         onclick="logout()" 
         style="background-color: #dc2626; margin-top: 8px;">
            Logout
        </button>

        <button 
            onclick="window.location.href='stats.html'"
            style="background-color: #0ea5e9; margin-top: 8px;">
            📊 View Stats
        </button>

        <div id="questionsList"></div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:3000';

        let token = localStorage.getItem('token');
        let userName = localStorage.getItem('userName');
        let allQuestions = [];

        // Redirect if not logged in
        if(!token){
            alert('Please login first');
            window.location.href='login.html';
        }

        document.querySelector('h1').textContent = userName + "'s Questions";

        document.getElementById('subtitle').textContent='Loading your questions...';

        // Fetch all questions
        fetch(BASE_URL + '/api/questions', {
            method: 'GET',
            headers: {'Authorization': 'Bearer ' + token}
        })
        .then(function(response){
            return response.json();
        })
        .then(function(data){
            allQuestions = data.questions;

            if(allQuestions.length === 0){
                document.getElementById('subtitle').textContent =
                 'No questions yet. Add your first one!';
                return;
            }
            

            document.getElementById('subtitle').textContent =
             'You have logged ' + allQuestions.length + ' questions.';

            // Difficulty breakdown
            let easy = allQuestions.filter(q => q.difficulty === 'Easy').length;
            let medium = allQuestions.filter(q => q.difficulty === 'Medium').length;
            let hard = allQuestions.filter(q => q.difficulty === 'Hard').length;

            document.getElementById('breakdown').textContent = 
                '🟢 Easy: '+easy+
                '   🟡 Medium: '+medium+
                '   🔴 Hard: '+hard;
                
            displayQuestions(allQuestions);
        })
        .catch(function(error){
            console.log('Error fetching', error);
        });

        // Search & Filter
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filterDifficulty').addEventListener('change', applyFilters);

        function applyFilters(){
            let searchText = document.getElementById('searchInput').value.toLowerCase();
            let difficulty = document.getElementById('filterDifficulty').value;

            let filtered = allQuestions.filter(function(question){
                let matchesSearch =
                    question.title.toLowerCase().includes(searchText) ||
                    question.company.toLowerCase().includes(searchText);

                let matchesDifficulty = 
                    difficulty === 'All' || question.difficulty === difficulty;

                return matchesSearch && matchesDifficulty;
            });

            displayQuestions(filtered)
        }

        // Display Questions
        function displayQuestions(questions){
            let container = document.getElementById('questionsList');
            container.innerHTML='';

            if(questions.length === 0){
                let msg = document.createElement('p');
                msg.textContent = 'No questions match your search.';
                msg.style.marginTop = '16px';
                msg.style.color = '#94a3b8';
                container.appendChild(msg);
                return;
            }
        
            // Build HTML for each question
            for(let question of questions){
                let card = document.createElement('div');
                card.className= 'question-card';
                
                let title = document.createElement('h3');
                title.textContent= question.title;

                let company = document.createElement('p');
                company.textContent= 'Company: '+ question.company;

                let topic = document.createElement('p');
                topic.textContent= 'Topic: '+ question.topic;

                let difficulty = document.createElement('p');
                difficulty.textContent= 'Difficulty: '+ question.difficulty;

                let notes = document.createElement('p');
                notes.textContent= 'Notes: '+ question.notes;

                let deleteBtn = document.createElement('button');
                deleteBtn.textContent='Delete';
                deleteBtn.style.backgroundColor='#dc2626';
                deleteBtn.style.marginTop='8px';
                deleteBtn.style.width='auto';
                deleteBtn.style.padding='6px 16px';
                deleteBtn.style.fontSize='13px';

                deleteBtn.addEventListener('click', function(){
                    deleteQuestion(question._id);
                });

                card.appendChild(title);
                card.appendChild(company);
                card.appendChild(topic);
                card.appendChild(difficulty);
                card.appendChild(notes);
                card.appendChild(deleteBtn);
                container.appendChild(card);
            }
        }

        // Delete Question
        function deleteQuestion(questionID){
            if(!confirm('Are you sure you want to delete this question?')){
                return;
            }

            fetch(BASE_URL + '/api/questions/' + questionID, {
                method: 'DELETE',
                headers:{'Authorization': 'Bearer '+token}
            })
            .then(function(response){
                return response.json();
            })
            .then(function(data){
                if(data.message === 'Question deleted successfully!'){
                    // Remove from allQuestions array without page reload
                    allQuestions = allQuestions.filter(function(q){
                        return q._id !== questionID;
                    });

                    // Update count
                    document.getElementById('subtitle').textContent = 
                        'You have logged ' + allQuestions.length + ' questions.';
                    
                    // Update breakdown
                    let easy   = allQuestions.filter(q => q.difficulty === 'Easy').length;
                    let medium = allQuestions.filter(q => q.difficulty === 'Medium').length;
                    let hard   = allQuestions.filter(q => q.difficulty === 'Hard').length;

                    document.getElementById('breakdown').textContent =
                        '🟢 Easy: ' + easy +
                        '   🟡 Medium: ' + medium +
                        '   🔴 Hard: ' + hard;

                    // Re-render without page reload
                    applyFilters();
                } else{
                    alert(data.message);
                }
            })
            .catch(function(error){
                console.log('Error deleting:', error);
            })
        }

        // Logout function
        function logout(){
            localStorage.removeItem('token');
            localStorage.removeItem('userID');
            localStorage.removeItem('userName');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
