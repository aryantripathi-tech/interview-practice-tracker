<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Interview Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>Welcome Backr</h1>
        <p style="color: #64748b; margin-bottom: 24px;">
            Login to your interview tracker
        </p>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="aryan@gmail.com">
        </div>

        <div>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password">
        </div>

        <p id="errorMsg" style="color: #dc2626; display: none;"></p>

        <button id="loginBtn" onclick="handleLogin()">Login</button>

        <p style="margin-top: 16px; text-align: center; color: #64748b;">
            Don't have an account? 
            <a href="signup.html" style="color: #1e40af;">Sign up here</a>
        </p>
    </div>

    <script>
        const BASE_URL= 'http://localhost:3000';

        // Redirect if already logged in
        let token = localStorage.getItem('token');
        if(token){
            window.location.href='dasboard.html';
        }

        function showError(message){
            let errorMsg=document.getElementById('erroeMsg');
            errorMsg.textContent=message;
            errorMsg.style.display='block';
        }

        function hideError(){
            document.getElementById('errorMsg').style.display='none';
        }

        function handleLogin(){
            hideError();
            let email=document.getElementById('email').value.trim();
            let password=document.getElementById('password').value;

            // Frontend validation
            if(!email){
                return showError('Please enter your email.');
            }
            if(!password){
                return showError('Please enter your password.');
            }

            // Disable button
            let btn=document.getElementById('loginBtn');
            btn.textContent='Logging in...';
            btn.disabled=true;
        

            // Send to backend
            fetch(BASE_URL+'/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })

            // Read the resposne
            .then(function(response){
                return response.json();
            })

            // Do something with the data
            .then(function(data){
                if(data.token){
                    // Save token to localStorage
                    localStorage.setItem('token',data.token);
                    localStorage.setItem('userID',data.user.id);
                    localStorage.setItem('userName',data.user.name);
                    window.location.href='dashboard.html';
                } else{
                    showError(data.message);
                    btn.textContent='Login';
                    btn.disabled=false;
                }
            })
            // Handle errors
            .catch(function(error){
                console.log('Error:', error);
                showError('Could not connect to server');
                btn.textContent='Login';
                btn.disabled=false;
            });
        }
    </script>
</body>
</html>
