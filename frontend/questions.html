<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - Interview Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <h1>Log an Interview Question</h1>

        <form action="" id="questionForm">
            <label for="">Question Title</label>
            <input type="text" id="title" placeholder="e.g. Two Sum">

            <label for="">Company</label>
            <input type="text" id="company" placeholder="e.g. Google">

            <label for="">Topic</label>
            <input type="text" id="topic" placeholder="e.g. Arrays">

            <label for="">Difficulty</label>
            <select name="" id="difficulty">
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>

            <label for="">Your Notes</label>
            <textarea name="" id="notes" placeholder="What approach did you use?"></textarea>

            <button type="submit">Save Question</button>
            
        </form>
    </div>

    <script>
        document.getElementById("questionForm").addEventListener("submit", function(event){
            event.preventDefault();

            let question={
                title:document.getElementById("title").value,
                company:document.getElementById("company").value,
                topic:document.getElementById("topic").value,
                difficulty:document.getElementById("difficulty").value,
                notes:document.getElementById("notes").value,
            };

            console.log("Question captured:", question);

            alert("Question saved! Title: "+question.title);
        });
    </script>
</body>
</html>
