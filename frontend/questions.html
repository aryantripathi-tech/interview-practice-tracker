<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - Interview Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="
    background-color: #1e40af;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;">

        <span style="color: white; font-weight: bold; font-size: 18px;">
            🎯 Interview Tracker
        </span>
        <div style="display: flex; gap: 12px;">
            <a href="dashboard.html"
                style="color: #93c5fd; text-decoration: none; font-size: 14px;">
                Dashboard
            </a>
            <a href="stats.html"
                style="color: #93c5fd; text-decoration: none; font-size: 14px;">
                Stats
            </a>
            <a href="questions.html"
                style="color: #93c5fd; text-decoration: none; font-size: 14px;">
                + Add Question
            </a>
            <a href="#" onclick="logout()"
                style="color: #fca5a5; text-decoration: none; font-size: 14px;">
                Logout
            </a>
        </div>
    </nav>
    
    <div class="container">

        <h1>Log an Interview Question</h1>

        <form action="" id="questionForm">
            <label for="">Question Title</label>
            <input type="text" id="title" placeholder="e.g. Two Sum">

            <label for="">Company</label>
            <input type="text" id="company" placeholder="e.g. Google">

            <label for="">Topic</label>
            <input type="text" id="topic" placeholder="e.g. Arrays">

            <label for="">Difficulty</label>
            <select name="" id="difficulty">
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>

            <label for="">Your Notes</label>
            <textarea name="" id="notes" placeholder="What approach did you use?"></textarea>

            <button type="submit">Save Question</button>
            
        </form>
    </div>

    <script>
        const BASE_URL='http://localhost:3000';

        // Check if user is logged in
        let token = localStorage.getItem('token');
        let userName = localStorage.getItem('userName');

        if(!token){
            alert('Please login first');
            window.location.href='login.html';
        }

        // Show username on page
        document.querySelector('h1').textContent = 'Hello, ' + userName + ' - Log a Question';

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            localStorage.removeItem('userName');
            window.location.href = 'login.html';
        }
    
        // Hadle form submission
        document.getElementById("questionForm").addEventListener("submit", function(event){
            event.preventDefault();

            let title =document.getElementById('title').value.trim();

            // Validate required field
            if(!title){
                alert('Question title is required.');
                return;
            }

            let btn = document.querySelector('button[type="submit"]');
            btn.textContent='Saving...';
            btn.disabled=true;

            let question={
                title:document.getElementById("title").value,
                company:document.getElementById("company").value,
                topic:document.getElementById("topic").value,
                difficulty:document.getElementById("difficulty").value,
                notes:document.getElementById("notes").value,
            };

            fetch(BASE_URL+'/api/questions',{
                method: "POST",
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(question)
            })

            .then(function(response){
                return response.json();
            })

            .then(function(data) {
                if(data.message === 'Question saved successfully!'){
                    window.location.href = 'dashboard.html';
                } else{
                    alert(data.message);
                    btn.textContent='Save Question';
                    btn.disabled=false;
                }
            })

            .catch(function(error){
                console.log('Error:', error);
                alert('Could not connect to server');
            });
        });
    </script>
</body>
</html>
